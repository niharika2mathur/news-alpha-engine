# ============================================================
# docker-compose.yml – Full Stack Infrastructure
# ============================================================
version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: newsalpha_postgres
    environment:
      POSTGRES_DB: newsalpha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB (for raw article storage) ──────────────────────
  mongodb:
    image: mongo:7.0
    container_name: newsalpha_mongodb
    environment:
      MONGO_INITDB_DATABASE: newsalpha
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  # ── Redis (for caching and task queue) ─────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: newsalpha_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsalpha_api
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/newsalpha
      - MONGODB_URL=mongodb://mongodb:27017/newsalpha
      - REDIS_URL=redis://redis:6379/0
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python main.py server --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Dashboard ─────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsalpha_dashboard
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

  # ── Pipeline Scheduler ──────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsalpha_scheduler
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/newsalpha
      - MONGODB_URL=mongodb://mongodb:27017/newsalpha
      - REDIS_URL=redis://redis:6379/0
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python main.py scheduler
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
